{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-up">

        <div class="auth-logo">
            <span class="hero-logo-icon">⬡</span>
            <div class="navbar-brand" style="justify-content:center;font-size:1.1rem;">
                Team Task Manager
            </div>
        </div>

        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your email to receive a reset link</p>

        <form method="POST">
            {% csrf_token %}
            
            <div class="sg-field">
                <label class="sg-label" for="id_email">Email address</label>
                <input type="email" name="email" id="id_email" class="sg-input" placeholder="you@example.com" required>
            </div>

            <button class="sg-submit-btn" type="submit">
                Send Reset Link →
            </button>
        </form>

        <p style="text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--text-muted);">
            Remember your password?
            <a href="{% url 'account_login' %}" style="color:#a5b4fc;text-decoration:none;font-weight:600;">Sign in →</a>
        </p>

    </div>
</div>
{% endblock %}
