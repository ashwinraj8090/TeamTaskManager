{% extends "base.html" %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h2 class="mb-4" style="font-weight: 800; color: var(--text-primary);">Settings</h2>

            <!-- Account Details -->
            <div class="card mb-4" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);">
                <div class="card-header p-4 border-bottom border-light border-opacity-10">
                    <h5 class="m-0" style="font-weight: 700;">Account Details</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label" style="font-size: 0.85rem; color: var(--text-muted);">Username</label>
                            <input type="text" name="username" value="{{ user_form.username.value }}" class="form-control" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;">
                        </div>
                        <div class="mb-4">
                            <label class="form-label" style="font-size: 0.85rem; color: var(--text-muted);">Email Address</label>
                            <input type="email" name="email" value="{{ user_form.email.value }}" class="form-control" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;">
                        </div>
                        <button type="submit" name="update_account" class="btn btn-primary w-100" style="border-radius: 10px; padding: 10px; font-weight: 600;">Update Account</button>
                    </form>
                </div>
            </div>

            <!-- Security / Password -->
            <div class="card" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);">
                <div class="card-header p-4 border-bottom border-light border-opacity-10">
                    <h5 class="m-0" style="font-weight: 700;">Security</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label" style="font-size: 0.85rem; color: var(--text-muted);">Change Password</label>
                            {% for field in password_form %}
                                <div class="mb-3">
                                    <div class="sg-eye-wrap">
                                        <input type="{{ field.field.widget.input_type }}" 
                                               name="{{ field.name }}" 
                                               id="id_{{ field.name }}" 
                                               placeholder="{{ field.label }}" 
                                               class="form-control" 
                                               style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; padding-right: 2.75rem;">
                                        <button type="button" class="sg-eye-btn" onclick="togglePw('id_{{ field.name }}', this)" tabindex="-1" aria-label="Show password">
                                            👁
                                        </button>
                                    </div>
                                    {% if field.errors %}
                                        <div class="text-danger mt-1" style="font-size: 0.75rem;">{{ field.errors|join:", " }}</div>
                                    {% endif %}
                                </div>
                            {% endfor %}
                        </div>
                        <button type="submit" name="change_password" class="btn btn-outline-primary w-100" style="border-radius: 10px; padding: 10px; font-weight: 600; border-width: 2px;">Change Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function togglePw(id, btn) {
        var inp = document.getElementById(id);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.textContent = '🙈';
        } else {
            inp.type = 'password';
            btn.textContent = '👁';
        }
    }
</script>
{% endblock %}
