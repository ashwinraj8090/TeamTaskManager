{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-up" style="text-align: center;">
        
        <div style="background:rgba(99,102,241,0.1);width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
            <svg width="32" height="32" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
        </div>

        <h1 class="auth-title">Verify Your Email</h1>
        <p class="auth-subtitle" style="margin-bottom: 2rem;">
            We have sent a verification link to your email address. Please check your inbox (and spam folder) to activate your account.
        </p>

        <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); padding: 1.25rem; border-radius: 12px; margin-bottom: 2rem;">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin: 0;">
                Once verified, you will be able to access your dashboard.
            </p>
        </div>

        <a href="{% url 'account_login' %}" class="sg-submit-btn" style="text-decoration:none;display:block;">
            Back to Sign In →
        </a>
    </div>
</div>
{% endblock %}
