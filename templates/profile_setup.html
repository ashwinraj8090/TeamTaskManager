{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-up">

        <div class="auth-logo">
            <span class="hero-logo-icon">⬡</span>
            <div class="navbar-brand" style="justify-content:center;font-size:1.1rem;">
                Team Task Manager
            </div>
        </div>

        <h1 class="auth-title">Complete Your Profile</h1>
        <p class="auth-subtitle">Just a few more details to set up your workspace.</p>

        <form method="POST">
            {% csrf_token %}
            
            <div class="sg-field">
                <label class="sg-label" for="id_display_name">Display Name</label>
                <input type="text" name="display_name" id="id_display_name" class="sg-input" placeholder="e.g. John Doe" required>
            </div>

            <div class="sg-field">
                <label class="sg-label" for="id_role">Your Role</label>
                <input type="text" name="role" id="id_role" class="sg-input" placeholder="e.g. Frontend Developer" required>
            </div>

            <button class="sg-submit-btn" type="submit">
                Go to Dashboard →
            </button>
        </form>

    </div>
</div>
{% endblock %}
