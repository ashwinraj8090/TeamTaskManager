{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-up" style="text-align: center;">

        <div style="background:rgba(99,102,241,0.1);width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
            <svg width="32" height="32" fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        </div>

        <h1 class="auth-title">Password Reset Complete</h1>
        <p class="auth-subtitle" style="margin-bottom: 2rem;">
            Your password has been set successfully. You may now log in with your new password.
        </p>

        <a href="{% url 'account_login' %}" class="sg-submit-btn" style="text-decoration:none;display:block;">
            Sign In →
        </a>

    </div>
</div>
{% endblock %}
