{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-up" style="text-align: center;">

        <div style="background:rgba(16,185,129,0.1);width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
            <svg width="32" height="32" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
        </div>

        <h1 class="auth-title">Check your email</h1>
        <p class="auth-subtitle" style="margin-bottom: 2rem;">
            We've emailed you instructions for setting your password, if an account exists with the email you entered. You should receive them shortly.
        </p>

        <a href="{% url 'account_login' %}" class="btn btn-secondary w-100 py-3" style="font-size:0.95rem;border-radius:12px;background:rgba(255,255,255,0.05);color:var(--text-primary);border:1px solid var(--border);text-decoration:none;">
            Return to Login
        </a>

    </div>
</div>
{% endblock %}
